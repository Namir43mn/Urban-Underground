<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - Underground Chat</title>
    <meta name="theme-color" content="#050505">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            max-width: 700px;
            margin: 100px auto 30px auto;
            height: calc(100vh - 140px);
            background: #111;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            padding: 16px 20px;
            background: #181818;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.4rem;
            color: #fff;
        }

        .chat-header h2 span {
            color: var(--green, #5CFF72);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message-bubble {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message-bubble.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--green, #5CFF72);
        }

        .message-content {
            background: #1e1e1e;
            padding: 10px 14px;
            border-radius: 14px;
            color: #ddd;
            font-size: 0.92rem;
            position: relative;
        }

        .message-bubble.mine .message-content {
            background: var(--green, #5CFF72);
            color: #000;
            font-weight: 600;
        }

        .message-sender {
            font-size: 0.75rem;
            color: var(--orange, #FF7A00);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .message-bubble.mine .message-sender {
            color: #333;
            text-align: right;
        }

        .chat-input-area {
            padding: 14px;
            background: #181818;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: #0d0d0d;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 12px 18px;
            color: #fff;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }

        .chat-input-area input:focus {
            border-color: var(--green, #5CFF72);
        }

        .send-btn {
            background: var(--green, #5CFF72);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 0 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <header>
        <nav>
            <a href="index.html" class="logo">
                UNDERGROUND <span>CHAT</span>
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="id.html">My ID</a></li>
            </ul>
        </nav>
    </header>

    <div class="chat-container">
        <div class="chat-header">
            <h2>LIVE <span>FEED</span></h2>
            <small style="color: #888;">Firebase Realtime</small>
        </div>

        <div class="chat-messages" id="messagesList">
            <!-- Messages render here -->
        </div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="send-btn">SEND</button>
        </form>
    </div>

    <!-- FIREBASE SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARFZiBsFAtgKAtWtMnyka52PORQFolijI",
            authDomain: "urbannoir-13ce8.firebaseapp.com",
            projectId: "urbannoir-13ce8",
            storageBucket: "urbannoir-13ce8.firebasestorage.app",
            messagingSenderId: "1059246827383",
            appId: "1:1059246827383:web:caa91c40c408d46e3b6372",
            measurementId: "G-CEPWKZXQVF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

     const currentUserId = localStorage.getItem("ug_current_user_id");
let currentUserProfile = null;

async function loadCurrentUser() {

    if (!currentUserId) {
        window.location.href = "createaccount.html";
        return;
    }

    try {

        const userRef = doc(db, "users", currentUserId);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
            window.location.href = "createaccount.html";
            return;
        }

        currentUserProfile = userSnap.data();

    } catch (error) {

        console.error("Failed to load user:", error);
        alert("Unable to load your profile.");
        return;

    }

}

await loadCurrentUser();

        const messagesList = document.getElementById('messagesList');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');

        // Listen for realtime live chat updates
       function renderMessage(msg) {

    const isMine = msg.senderId === currentUserId;

    return `
        <div class="message-bubble ${isMine ? "mine" : ""}">

            <img
                class="message-avatar"
                src="${msg.senderPhoto || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=250&q=80"}"
                alt="Profile">

            <div class="message-content">

                <div class="message-sender">
                    ${isMine ? "You" : (msg.senderName || "Unknown")}
                </div>

                <div>${msg.text || ""}</div>

            </div>

        </div>
    `;

}

const messagesQuery = query(
    collection(db, "messages"),
    orderBy("createdAt", "asc")
);

onSnapshot(messagesQuery, (snapshot) => {

    messagesList.innerHTML = "";

    snapshot.forEach((document) => {

        const msg = document.data();

        messagesList.insertAdjacentHTML(
            "beforeend",
            renderMessage(msg)
        );

    });

    messagesList.scrollTop = messagesList.scrollHeight;

}, (error) => {

    console.error("Realtime listener error:", error);

});

        // Send Message
        chatForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const text = messageInput.value.trim();

    if (text.length === 0) return;

    messageInput.disabled = true;

    try {

        await addDoc(collection(db, "messages"), {

            text: text,

            senderId: currentUserId,

            senderName: currentUserProfile.fullName,

            senderPhoto: currentUserProfile.photo,

            createdAt: serverTimestamp()

        });

        messageInput.value = "";
        messageInput.focus();

    } catch (error) {

        console.error(error);
        alert("Failed to send message.");

    } finally {

        messageInput.disabled = false;

    }

});
    </script>
</body>
</html>
