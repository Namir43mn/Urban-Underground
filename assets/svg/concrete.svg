<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <!-- Concrete Noise & Texture Generator -->
    <filter id="concrete-texture" x="0%" y="0%" width="100%" height="100%">
      <!-- Base Fine Noise (Pores & Grain) -->
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="fineNoise" />
      
      <!-- Larger Roughness (Surface Cracks/Patches) -->
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" result="coarseNoise" />
      
      <!-- Combine Fine & Coarse Noise -->
      <feComposite in="fineNoise" in2="coarseNoise" operator="arithmetic" k1="0" k2="0.6" k3="0.4" k4="0" result="combinedNoise" />
      
      <!-- Map Noise to Dark Grayscale Concrete Tones -->
      <feColorMatrix type="matrix" values="
        0.18 0 0 0 0.08
        0 0.18 0 0 0.08
        0 0 0.20 0 0.09
        0 0 0    1 0" result="concreteBase" />

      <!-- Create Subtle Lighting Effects / Relief -->
      <feDiffuseLighting in="combinedNoise" lighting-color="#ffffff" surfaceScale="1.5" result="light">
        <feDistantLight azimuth="45" elevation="50" />
      </feDiffuseLighting>

      <!-- Blend Texture with Lighting -->
      <feBlend mode="multiply" in="light" in2="concreteBase" result="finalConcrete" />
    </filter>

    <!-- Subtle Vignette for Edge Depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4" />
    </radialGradient>
  </defs>

  <!-- Base Layer with Filter Applied -->
  <rect width="100%" height="100%" fill="#1a1a1e" filter="url(#concrete-texture)" />

  <!-- Overlay Vignette for Atmosphere -->
  <rect width="100%" height="100%" fill="url(#vignette)" style="mix-blend-mode: multiply;" />
</svg>
