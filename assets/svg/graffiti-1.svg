<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">

<defs>

<filter id="shadow">
<feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
</filter>

<linearGradient id="paint" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#39FF14"/>
<stop offset="50%" stop-color="#00C8FF"/>
<stop offset="100%" stop-color="#FF3D00"/>
</linearGradient>

</defs>

<!-- Paint Splash -->
<path fill="url(#paint)" opacity=".9"
d="
M120 210
C150 120 260 120 300 210
C340 100 470 120 500 240
C600 180 700 220 710 320
C840 280 910 360 860 470
C980 520 930 650 760 610
C720 690 560 670 520 590
C420 660 300 610 270 520
C140 540 70 410 120 310
Z"/>

<!-- Drips -->
<rect x="290" y="505" width="20" height="90" rx="10" fill="#39FF14"/>
<circle cx="300" cy="610" r="18" fill="#39FF14"/>

<rect x="520" y="530" width="24" height="120" rx="12" fill="#00C8FF"/>
<circle cx="532" cy="662" r="20" fill="#00C8FF"/>

<rect x="700" y="500" width="18" height="80" rx="9" fill="#FF3D00"/>
<circle cx="709" cy="590" r="16" fill="#FF3D00"/>

<!-- Crown -->
<path
fill="#ffffff"
opacity=".9"
d="
M520 120
L560 170
L610 110
L660 170
L710 120
L730 210
L500 210
Z"/>

<!-- Graffiti Arrow -->
<path
d="M820 160
L920 130
L880 90
L1040 150
L900 240
L910 180
L810 210Z"
fill="#ffffff"/>

<!-- Star -->
<polygon
fill="#FFD400"
points="
920,340
940,390
990,390
950,420
965,470
920,440
875,470
890,420
850,390
900,390"/>

<!-- Spray Dots -->
<g fill="#fff">

<circle cx="120" cy="120" r="6"/>
<circle cx="170" cy="90" r="4"/>
<circle cx="220" cy="80" r="3"/>
<circle cx="1040" cy="540" r="6"/>
<circle cx="1090" cy="520" r="4"/>
<circle cx="1120" cy="560" r="3"/>
<circle cx="1000" cy="600" r="5"/>
<circle cx="240" cy="620" r="5"/>
<circle cx="170" cy="560" r="3"/>

</g>

<!-- Graffiti Text -->
<text
x="250"
y="390"
font-size="120"
font-family="Permanent Marker, Arial"
fill="#ffffff"
stroke="#000"
stroke-width="8"
filter="url(#shadow)"
transform="rotate(-8 250 390)">

NO RULES

</text>

</svg>