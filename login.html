<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underground Chat - Login</title>
  <meta name="theme-color" content="#050505">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">

  <!-- Google Identity Services Library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --green: #5CFF72;
      --orange: #FF7A00;
      --bg: #050505;
      --card-bg: rgba(18, 18, 18, 0.85);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient FX */
    #mouse-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(92, 255, 114, 0.12) 0%, rgba(255, 122, 0, 0.05) 45%, transparent 70%);
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%);
      transition: transform 0.03s linear;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
    }

    /* Modal / Card */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 36px 28px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(92, 255, 114, 0.08);
      text-align: center;
      animation: popup 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes popup {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .brand-logo {
      font-family: 'Permanent Marker', cursive;
      font-size: 1.8rem;
      color: #fff;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 8px;
    }

    .brand-logo span {
      color: var(--green);
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(92, 255, 114, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #050505;
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 0 20px rgba(92, 255, 114, 0.3);
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(92, 255, 114, 0.6);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #555;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      padding: 0 12px;
    }

    /* Google Button Container */
    .google-btn-container {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    /* Redirect Text */
    .register-prompt {
      margin-top: 24px;
      font-size: 0.88rem;
      color: #888;
    }

    .register-prompt a {
      color: var(--green);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s;
    }

    .register-prompt a:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Ambient FX -->
  <div id="mouse-glow"></div>
  <canvas id="particles-canvas"></canvas>

  <!-- Login Modal Box -->
  <div class="login-card">
    <a href="index.html" class="brand-logo">
      UNDERGROUND <span>CHAT</span>
    </a>
    <p class="subtitle">Enter your ID credentials to unlock the tunnel</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="user-email">Gmail / ID</label>
        <input type="email" id="user-email" placeholder="tagger@gmail.com" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="user-password">Password</label>
        <input type="password" id="user-password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-submit">Login</button>
    </form>

    <div class="divider">
      <span>OR DIRECT</span>
    </div>

    <!-- Official Google Auth Setup -->
    <div id="g_id_onload"
         data-client_id="384287106499-eq2bp1e3esc50c82mvg6m2urjjjca3qs.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="google-btn-container">
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="dark"
           data-text="continue_with"
           data-shape="pill"
           data-logo_alignment="left">
      </div>
    </div>

    <div class="register-prompt">
      Don't have a tag yet? <a href="createaccount.html">Create Account</a>
    </div>
  </div>

  <!-- Interactive Scripts -->
  <script>
    // Mouse Glow Track
    const glow = document.getElementById('mouse-glow');
    window.addEventListener('mousemove', (e) => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });

    // Background Particle Canvas
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5 - 0.2;
        this.opacity = Math.random() * 0.6 + 0.2;
        this.color = Math.random() > 0.5 ? '#5CFF72' : '#FF7A00';
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 40; i++) particles.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Standard Form Login Handler
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('user-email').value;

      localStorage.setItem('user_gmail', email);
      localStorage.setItem('user_logged_in', 'true');
      window.location.href = 'chat.html';
    });

    // Google Sign-In Callback Handler
    function handleCredentialResponse(response) {
      // Decode JWT token payload to extract user details
      const responsePayload = parseJwt(response.credential);

      localStorage.setItem('user_gmail', responsePayload.email || 'google_user');
      localStorage.setItem('user_name', responsePayload.name || 'Tagger');
      localStorage.setItem('user_picture', responsePayload.picture || '');
      localStorage.setItem('user_logged_in', 'true');

      // Redirect to main chat room
      window.location.href = 'chat.html';
    }

    // Helper function to decode JWT Token
    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) {
        return {};
      }
    }
  </script>
</body>
</html>
