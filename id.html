<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versity ID Card - Underground Chat</title>
    <meta name="theme-color" content="#050505">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .id-wrapper {
            max-width: 440px;
            margin: 110px auto 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .id-card {
            background: linear-gradient(145deg, #181818 0%, #0d0d0d 100%);
            border: 2px solid rgba(92, 255, 114, 0.4);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 35px rgba(92, 255, 114, 0.15);
            position: relative;
            overflow: hidden;
        }

        .id-card::before {
            content: "OFFICIAL TAGGER";
            position: absolute;
            top: 18px;
            right: -30px;
            background: var(--orange, #FF7A00);
            color: #000;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 35px;
            transform: rotate(45deg);
            letter-spacing: 1px;
        }

        .id-header {
            text-align: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 16px;
            margin-bottom: 22px;
        }

        .id-header h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .id-header h2 span {
            color: var(--green, #5CFF72);
        }

        .id-header p {
            font-size: 0.75rem;
            color: var(--orange, #FF7A00);
            letter-spacing: 2px;
            margin-top: 2px;
            font-weight: 700;
        }

        .id-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .id-photo-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--green, #5CFF72);
            padding: 3px;
            background: #000;
            box-shadow: 0 0 20px rgba(92, 255, 114, 0.3);
        }

        .id-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .id-details {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 8px;
        }

        .detail-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .detail-label {
            color: #888;
            font-weight: 500;
            font-size: 0.82rem;
        }

        .detail-value {
            color: #fff;
            font-weight: 700;
            text-align: right;
            word-break: break-all;
        }

        .detail-value.highlight {
            color: var(--green, #5CFF72);
            font-family: monospace;
            font-size: 1rem;
        }

        .card-actions {
            margin-top: 25px;
            display: flex;
            gap: 12px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-chat {
            background: var(--green, #5CFF72);
            color: #000;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <header>
        <nav>
            <a href="index.html" class="logo">
                UNDERGROUND
                <span>CHAT</span>
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="id.html">My ID</a></li>
            </ul>
        </nav>
    </header>

    <div class="id-wrapper">
        <div class="id-card">
            <div class="id-header">
                <h2>UNDERGROUND <span>ID</span></h2>
                <p>VERSITY PASSPORT</p>
            </div>

            <div class="id-body">
                <div class="id-photo-container">
                    <img src="" id="displayPhoto" class="id-photo" alt="Student Photo">
                </div>

                <div class="id-details">
                    <div class="detail-row">
                        <span class="detail-label">Full Name</span>
                        <span class="detail-value" id="displayName">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Versity ID</span>
                        <span class="detail-value highlight" id="displayVersityId">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Email</span>
                        <span class="detail-value" id="displayEmail">Loading...</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value" id="displayPhone">Loading...</span>
                    </div>
                </div>
            </div>

            <div class="card-actions">
                <a href="createaccount.html" class="btn-action btn-edit">Edit Profile</a>
                <a href="chat.html" class="btn-action btn-chat">Enter Chat</a>
            </div>
        </div>
    </div>

    <!-- FIREBASE SDKs -->
   <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyARFZiBsFAtgKAtWtMnyka52PORQFolijI",
    authDomain: "urbannoir-13ce8.firebaseapp.com",
    projectId: "urbannoir-13ce8",
    storageBucket: "urbannoir-13ce8.firebasestorage.app",
    messagingSenderId: "1059246827383",
    appId: "1:1059246827383:web:caa91c40c408d46e3b6372",
    measurementId: "G-CEPWKZXQVF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {

    console.log("Firebase User:", user);

    if (!user) {
        alert("Please login first.");
        window.location.href = "login.html";
        return;
    }

    try {
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();

            document.getElementById("displayName").textContent = data.fullName || "N/A";
            document.getElementById("displayVersityId").textContent = data.versityId || "N/A";
            document.getElementById("displayEmail").textContent = data.email || "N/A";
            document.getElementById("displayPhone").textContent = data.phone || "N/A";
            document.getElementById("displayPhoto").src = data.photo || "";
        } else {
            alert("Profile not found.");
            window.location.href = "createaccount.html";
        }

    } catch (e) {
        console.error(e);
        alert(e.message);
    }

});
</script>
</body>
</html>
