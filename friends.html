<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew & Tunnels - Underground Chat</title>
    <meta name="theme-color" content="#050505">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* ================= FX LAYERS ================= */
        #mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(92, 255, 114, 0.12) 0%, rgba(255, 122, 0, 0.04) 45%, transparent 70%);
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: transform 0.04s linear;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .ambient-smoke {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
            background: url('assets/svg/smoke.svg') center/cover no-repeat;
            animation: smokeMove 25s infinite alternate ease-in-out;
        }

        @keyframes smokeMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-30px, 20px); }
        }

        /* ================= FRIENDS LAYOUT ================= */
        .friends-container {
            max-width: 1000px;
            margin: 120px auto 60px auto;
            padding: 0 20px;
            position: relative;
            z-index: 5;
        }

        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .section-header h1 {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.8rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .section-header h1 span {
            color: var(--green, #5CFF72);
        }

        .section-header p {
            color: #a5a5a5;
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Search Bar Box */
        .search-box-wrapper {
            background: #111;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            transition: border-color 0.3s;
        }

        .search-box-wrapper:focus-within {
            border-color: var(--green, #5CFF72);
            box-shadow: 0 0 20px rgba(92, 255, 114, 0.2);
        }

        .search-box-wrapper svg {
            width: 22px;
            height: 22px;
            fill: #777;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
        }

        .search-input::placeholder {
            color: #666;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--green, #5CFF72);
            border-bottom: 2px solid var(--green, #5CFF72);
        }

        /* User Cards Grid */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: #121212;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .user-card:hover {
            transform: translateY(-4px);
            border-color: rgba(92, 255, 114, 0.4);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.4rem;
            color: var(--green, #5CFF72);
            border: 2px solid rgba(92, 255, 114, 0.3);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #121212;
        }

        .status-dot.online { background: #5CFF72; }
        .status-dot.offline { background: #555; }

        .details h3 {
            color: #fff;
            font-size: 1.1rem;
            margin: 0;
            font-weight: 700;
        }

        .details span {
            color: #FF7A00;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Action Buttons */
        .card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            flex: 1;
            padding: 10px 12px;
            border-radius: 30px;
            border: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-chat {
            background: var(--green, #5CFF72);
            color: #050505;
        }

        .btn-chat:hover {
            background: #4ae660;
            box-shadow: 0 0 12px rgba(92, 255, 114, 0.4);
        }

        .btn-poke {
            background: rgba(255, 122, 0, 0.15);
            color: #FF7A00;
            border: 1px solid rgba(255, 122, 0, 0.4);
        }

        .btn-poke:hover {
            background: #FF7A00;
            color: #fff;
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-add:hover {
            background: #fff;
            color: #000;
        }

        .btn-add.added {
            background: rgba(92, 255, 114, 0.1);
            color: #5CFF72;
            border-color: rgba(92, 255, 114, 0.3);
            pointer-events: none;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid var(--green, #5CFF72);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            font-weight: 600;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Background FX -->
    <div id="mouse-glow"></div>
    <canvas id="particles-canvas"></canvas>
    <div class="ambient-smoke"></div>

    <!-- Noise -->
    <div class="noise"></div>

    <!-- Header Navigation -->
    <header>
        <nav>
            <a href="index.html" class="logo">
                UNDERGROUND
                <span>CHAT</span>
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="chat.html">Chat</a></li>
                <li><a href="friends.html" style="color: var(--green, #5CFF72);">Crew</a></li>
                <li><a href="notification.html">Alerts</a></li>
                <li><a href="id.html">My ID</a></li>
            </ul>
            <div class="nav-btn">
                <a href="chat.html" class="join">Enter Tunnel</a>
            </div>
        </nav>
    </header>

    <!-- Main Crew & Friends Container -->
    <div class="friends-container">
        <div class="section-header">
            <h1>YOUR <span>CREW</span></h1>
            <p>Search taggers by ID number or Username to leave a mark in their tunnel.</p>
        </div>

        <!-- Search Bar -->
        <div class="search-box-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by Username or ID (e.g., #4040, ToxicSpray)...">
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tabFriends">My Friends (<span id="friendCount">0</span>)</button>
            <button class="tab-btn" id="tabSearch">Discover Taggers</button>
        </div>

        <!-- User Cards Grid -->
        <div class="user-grid" id="userGrid">
            <!-- Dynamic users render here -->
        </div>
    </div>

    <!-- Toast Popup -->
    <div class="toast" id="toast">Signal Sent! 👈</div>

    <!-- FIREBASE MODULE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyARFZiBsFAtgKAtWtMnyka52PORQFolijI",
            authDomain: "urbannoir-13ce8.firebaseapp.com",
            projectId: "urbannoir-13ce8",
            storageBucket: "urbannoir-13ce8.firebasestorage.app",
            messagingSenderId: "1059246827383",
            appId: "1:1059246827383:web:caa91c40c408d46e3b6372",
            measurementId: "G-CEPWKZXQVF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let usersDatabase = [];
        let friendIds = new Set();
        let currentTab = "friends";

        const currentUserId = localStorage.getItem("ug_current_user_id");
        const userGrid = document.getElementById("userGrid");
        const searchInput = document.getElementById("searchInput");
        const tabFriends = document.getElementById("tabFriends");
        const tabSearch = document.getElementById("tabSearch");
        const toast = document.getElementById("toast");

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        async function fetchFriendsAndUsers() {
            try {
                // 1. Fetch current user's friends list
                if (currentUserId) {
                    const friendsSnap = await getDocs(query(collection(db, "friends"), where("userId", "==", currentUserId)));
                    friendsSnap.forEach(docSnap => {
                        friendIds.add(docSnap.data().friendId);
                    });
                }

                // 2. Fetch all users from Firestore
                const usersSnap = await getDocs(collection(db, "users"));
                usersDatabase = [];

                usersSnap.forEach(docSnap => {
                    const data = docSnap.data();
                    if (docSnap.id !== currentUserId) { // Exclude current logged in user
                        usersDatabase.push({
                            id: docSnap.id,
                            versityId: data.versityId || "0000",
                            username: data.fullName || "Anonymous Tagger",
                            photo: data.photo || "",
                            isFriend: friendIds.has(docSnap.id),
                            online: true,
                            initials: data.fullName ? data.fullName.split(" ").map(n => n[0]).join("").toUpperCase() : "UG"
                        });
                    }
                });

                renderUsers();
            } catch (err) {
                console.error("Error loading users from Firebase:", err);
            }
        }

        function renderUsers() {
            const queryVal = searchInput.value.toLowerCase().trim();
            userGrid.innerHTML = "";

            const filtered = usersDatabase.filter(user => {
                const matchesSearch = user.username.toLowerCase().includes(queryVal) || user.versityId.includes(queryVal);
                if (currentTab === "friends") {
                    return user.isFriend && matchesSearch;
                } else {
                    return matchesSearch;
                }
            });

            // Update friends count
            const friendCount = usersDatabase.filter(u => u.isFriend).length;
            document.getElementById("friendCount").textContent = friendCount;

            if (filtered.length === 0) {
                userGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px 0;">No taggers found matching your search.</div>`;
                return;
            }

            filtered.forEach(user => {
                const card = document.createElement("div");
                card.className = "user-card";
                
                const avatarContent = user.photo 
                    ? `<img src="${user.photo}" alt="${user.username}">` 
                    : user.initials;

                card.innerHTML = `
                    <div class="user-info">
                        <div class="avatar-container">
                            <div class="avatar">${avatarContent}</div>
                            <div class="status-dot ${user.online ? 'online' : 'offline'}"></div>
                        </div>
                        <div class="details">
                            <h3>${user.username}</h3>
                            <span>ID: #${user.versityId}</span>
                        </div>
                    </div>
                    <div class="card-actions">
                        ${user.isFriend ? `
                            <a href="chat.html?user=${encodeURIComponent(user.username)}" class="btn-action btn-chat">
                                💬 Chat
                            </a>
                            <button class="btn-action btn-poke" data-name="${user.username}">
                                👈 Poke
                            </button>
                        ` : `
                            <button class="btn-action btn-add" data-id="${user.id}" data-name="${user.username}">
                                ➕ Add Friend
                            </button>
                        `}
                    </div>
                `;
                userGrid.appendChild(card);
            });

            // Attach dynamic event handlers
            document.querySelectorAll(".btn-poke").forEach(btn => {
                btn.addEventListener("click", () => {
                    const name = btn.getAttribute("data-name");
                    showToast(`👉 You poked ${name}! They received your signal.`);
                });
            });

            document.querySelectorAll(".btn-add").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const id = btn.getAttribute("data-id");
                    const name = btn.getAttribute("data-name");
                    await addFriend(id, name);
                });
            });
        }

        async function addFriend(friendId, friendName) {
            if (!currentUserId) {
                showToast("⚠️ Please log in to add friends.");
                return;
            }

            try {
                const friendDocRef = doc(db, "friends", `${currentUserId}_${friendId}`);
                await setDoc(friendDocRef, {
                    userId: currentUserId,
                    friendId: friendId,
                    addedAt: new Date()
                });

                friendIds.add(friendId);
                const targetUser = usersDatabase.find(u => u.id === friendId);
                if (targetUser) targetUser.isFriend = true;

                showToast(`🎉 Added ${friendName} to your crew!`);
                renderUsers();
            } catch (e) {
                console.error("Error adding friend: ", e);
                showToast("❌ Could not add friend. Try again.");
            }
        }

        // Tabs Toggle
        tabFriends.addEventListener("click", () => {
            currentTab = "friends";
            tabFriends.classList.add("active");
            tabSearch.classList.remove("active");
            renderUsers();
        });

        tabSearch.addEventListener("click", () => {
            currentTab = "search";
            tabSearch.classList.add("active");
            tabFriends.classList.remove("active");
            renderUsers();
        });

        searchInput.addEventListener("input", renderUsers);

        // Initial Fetch
        fetchFriendsAndUsers();
    </script>

    <!-- UI ANIMATIONS & CANVAS SCRIPT -->
    <script>
        // --- MOUSE GLOW ---
        const glow = document.getElementById('mouse-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // --- PARTICLES CANVAS ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5 - 0.2;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.color = Math.random() > 0.5 ? '#5CFF72' : '#FF7A00';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
